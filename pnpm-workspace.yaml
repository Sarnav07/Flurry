packages:
  - "shared"
  - "orchestrator"
  - "scripts"
  - "yeti-trials-frontend"

allowBuilds:
  esbuild: set this to true or false
  msw: set this to true or false

# Allow esbuild (pulled in by vitest) to run its install build script so the
# ignored-builds guard does not block workspace commands.
onlyBuiltDependencies:
  - esbuild

# Do not re-run `pnpm install` before every `pnpm run`/`pnpm exec`. The check
# otherwise fails on the esbuild build-approval gate even when deps are present.
verifyDepsBeforeRun: false
